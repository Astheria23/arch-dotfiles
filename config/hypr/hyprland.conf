$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun -show-icons

# ======================
# Startup
# ======================

exec-once = swaync
exec-once = waybar
exec-once = awww-daemon
exec-once = swayosd-server
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = python3 ~/.config/hypr/led_osd_daemon.py
#exec-once = blueman-applet
exec-once = hypridle > /dev/null 2>&1
exec-once = ~/.config/hypr/generate_monitors.sh

blurls = waybar

# ======================
# Power Settings
# ======================

exec-once = ~/.config/hypr/cpu_mode.sh bring
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/cpu_mode.sh
bind = $mainMod CTRL, A, exec, ~/.config/hypr/run_aod.sh
bindl = SUPER, Escape, exec, killall -SIGUSR1 hyprlock
bindl = SUPER, space, exec, killall -SIGUSR1 hyprlock

# ======================
# Display
# ======================
monitor = eDP-1, preferred, auto, 1
monitor = HDMI-A-1, highrr, auto, 1
monitor = , preferred, auto, 1

source = /tmp/hypr_dynamic.conf


# ======================
# Failsafe Reload
# ======================

bind = $mainMod SHIFT, P, exec, bash -c '~/.config/hypr/generate_monitors.sh && hyprctl reload'
bind = $mainMod CTRL, P, exec, bash -c '~/.config/hypr/generate_monitors.sh external && hyprctl reload'

# ======================
# Smart Lid Switch
# ======================

bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/lid_handler.sh close
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/lid_handler.sh open

# ======================
# Environment Variables
# ======================
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_THEME,Adwaita:dark
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24


# ======================
# Sidebar
# ======================

bind = $mainMod, N, exec, swaync-client -t -sw

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

# Rofi blur
layerrule = blur on, match:class ^rofi$
layerrule = ignore_alpha 0.5, match:class ^rofi$

# ====================================================================================
# ======================
# Essential Workflow Binding
# ======================

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist wipe
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec,  flatpak run app.zen_browser.zen
bind = $mainMod, H, exec, ~/.config/hypr/keybinds_help.sh
bind = $mainMod CTRL, H, movefocus, l
bind = $mainMod CTRL, L, movefocus, r
bind = $mainMod CTRL, K, movefocus, u
bind = $mainMod CTRL, J, movefocus, d
bind = $mainMod, F, fullscreen, 1

# =========================================
# WORKSPACE ROUTING (fallback — overridden by source)
# =========================================

workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1


# ======================
# MONITOR SHORTCUTTS
# ======================

bind = $mainMod ALT, 1, exec, ~/.config/hypr/monitor_mode.sh laptop
bind = $mainMod ALT, 2, exec, ~/.config/hypr/monitor_mode.sh external
bind = $mainMod ALT, 3, exec, ~/.config/hypr/monitor_mode.sh extend
bind = $mainMod ALT, 4, exec, ~/.config/hypr/monitor_mode.sh mirror

# ======================
# Brightness Control
# ======================

binde = , XF86MonBrightnessUP, exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# ======================
# Volume Control
# ======================

binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
binde = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# ======================
# Screenshot
# ======================

bind = , Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# ======================
# Hyprpicker
# ======================

bind = $mainMod SHIFT, C, exec, hyprpicker -a -r -f hex -n

# ======================
# Context Menu
# ======================

bind = $mainMod, grave, exec, ~/.config/hypr/context_menu.sh

# ======================
# Cycle Window
# ======================

bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop

# ======================
# Detach window
# ======================

bind = $mainMod, Space, togglefloating,

# ======================
# Fullscreen
# ======================

bind = CONTROL $mainMod, F, fullscreen,

# ======================
# workspace
# ======================

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# ======================
# Sidebar
# ======================

#bind = $mainMod, n, swaync-client -t



# ======================
# move workspace
# ======================

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ======================
# Waypaper
# ======================

bind = $mainMod SHIFT, W, exec, waypaper


# ================================================================


# ======================
# Personalization Input
# ======================
input{

touchpad{
   natural_scroll = true
   scroll_factor = 0.2
}
}

# ======================
# Gestures
# ======================

gesture = 3, horizontal, workspace

# =========================================
# MOUSE BINDING
# =========================================

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
general {
    resize_on_border = true
}
binde = $mainMod SHIFT, l, resizeactive, 30 0
binde = $mainMod SHIFT, h, resizeactive, -30 0
binde = $mainMod SHIFT, k, resizeactive, 0 -30
binde = $mainMod SHIFT, j, resizeactive, 0 30

# ======================
# Decoration
# ======================

general {
    gaps_in = 5
    gaps_out = 10
    layout = dwindle

    # Border colors
    border_size = 2
    col.active_border = rgba(137,180,250,1.0)
    col.inactive_border = rgba(108,112,134,1.0)
}

animations {
    enabled = true

    # Bezier curves
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = spring, 0.34, 1.56, 0.64, 1
    bezier = softOut, 0.16, 1, 0.3, 1
    bezier = workspaceSlide, 0.32, 0, 0.67, 1

    # Window animations
    animation = windows, 1, 5, spring, popin 85%
    animation = windowsOut, 1, 4, softOut, popin 80%
    animation = fade, 1, 4, softOut
    animation = border, 1, 5, softOut

    # Workspace slide
    animation = workspaces, 1, 1.5, workspaceSlide, slide
}

decoration {
    rounding = 10

    # Shadow
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(0, 0, 0, 0.25)
    }

    # Dim inactive windows
    dim_inactive = true
    dim_strength = 0.15

    # Inactive window opacity
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }
}

set-option -g default-shell /usr/bin/zsh
set-option -g default-command /usr/bin/zsh

bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Enable vi copy mode
setw -g mode-keys vi

# Use y to copy to system clipboard
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Use vi-style copy mode
setw -g mode-keys vi

# Copy with y and pipe to our custom script
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "~/.local/bin/tmux-system-copy"


# Set prefix to Ctrl-a instead of default Ctrl-b (optional)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Better colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable mouse support
set -g mouse on

# Split pane shortcuts (more intuitive)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R


# Enable vi-mode in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Status bar customization
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-bg black
set -g status-fg white

# Show current window list and time
set -g status-left-length 60
set -g status-right-length 90
set -g status-left "#[fg=cyan]#S #[fg=white]|"
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=green]%H:%M:%S"

# Highlight active window
setw -g window-status-current-format "#[fg=black,bg=cyan] #I:#W #[default]"

# Start in Zsh if available
set-option -g default-shell /usr/bin/zsh

# Reload config with Ctrl-a + r
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"

# Auto rename off (more stable)
set-option -g allow-rename off

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # Recommended for sane defaults

# Session saver plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# auto-restore contuum
set -g @continuum-restore 'on'

#Tmux Plugin Manager
run '~/.config/tmux/plugins/tpm/tpm'
